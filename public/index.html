<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataChat - Storage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📁 DataChat</h1>
                <button class="btn-new-chat" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </aside>

        <main class="main-content">
            <div class="chat-view">
                <div class="chat-header" id="chatHeader" style="display: none;">
                    <div class="chat-info">
                        <h2 id="chatName">Select a chat</h2>
                        <p id="chatDescription"></p>
                    </div>
                    <button class="btn-icon" id="deleteChatBtn" title="Delete chat">🗑️</button>
                </div>

                <div class="messages-container" id="messagesContainer"></div>

                <div class="input-area" id="inputArea" style="display: none;">
                    <div class="input-controls">
                        <button class="btn-icon" id="attachBtn" title="Attach file">📎</button>
                        <input type="file" id="fileInput" style="display: none;">
                    </div>
                    <input type="text" id="messageInput" placeholder="Type a message or attach a file...">
                    <button class="btn-send" id="sendBtn">Send</button>
                </div>

                <div class="empty-state" id="emptyState">
                    <div class="empty-state-content">
                        <h2>Welcome to DataChat</h2>
                        <p>Create a new chat to get started!</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="chatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">New Chat</h3>
                <button class="btn-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="chatForm">
                <div class="form-group">
                    <label for="chatNameInput">Chat Name</label>
                    <input type="text" id="chatNameInput" required placeholder="Enter chat name">
                </div>
                <div class="form-group">
                    <label for="chatDescInput">Description (optional)</label>
                    <textarea id="chatDescInput" placeholder="Enter description" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save Chat</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Message</h3>
                <button class="btn-close" id="closeEditModalBtn">&times;</button>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label for="editContent">Content</label>
                    <textarea id="editContent" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="editTimestamp">Date & Time</label>
                    <input type="datetime-local" id="editTimestamp">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
